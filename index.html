const FETCH_TIMEOUT_MS = 45000;

function fetchWithTimeout(url, opts, timeoutMs = FETCH_TIMEOUT_MS) {
  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), timeoutMs);
  return fetch(url, { ...opts, signal: controller.signal }).finally(() => clearTimeout(timer));
}

async function safeFetch(url, opts) {
  const res = await fetchWithTimeout(url, opts);
  if (!res.ok) {
    let msg = `Error ${res.status}`;
    if (res.status === 401) msg = "API key issue — tell Rob to check Vercel env vars.";
    else if (res.status === 400) msg = "API credits may be low — tell Rob to check the Anthropic dashboard.";
    else if (res.status === 429) msg = "Rate limited — wait 30 seconds and try again.";
    else if (res.status === 529) msg = "API is overloaded — try again in a minute.";
    else if (res.status >= 500) msg = "Server error — try again in a moment.";
    throw new Error(msg);
  }
  return res;
}

const YPM = {

const INTENSITY_LABELS = ["Just Moving", "Fitness", "Training", "Competitive", "Elite"];
const INTENSITY_COLORS = ["#22c55e", "#84cc16", "#f59e0b", "#f97316", "#ef4444"];
const DAYS_OF_WEEK     = ["Mon", "Tue", "Wed", "Thu", "Fri", "Sat", "Sun"];
const LENGTH_OPTIONS   = [45, 60, 75, 90, 120];

const VARIETY_RULES = `
VARIETY RULES — CRITICAL:
- NEVER write a straight 400 or longer sustained swim as a main set element. Break everything up.
- Use ladders: e.g. 25-50-75-100-75-50-25, or 100-200-300-200-100
- Use descending sets: each rep faster, interval drops 5-10 sec each round
- Use broken swims: 200 broken at each 50 with :10 rest builds race feel without grinding
- Use competition elements: "race the lane next to you," "negative split or add a 25," "team beats the clock gets out 3 min early"
- Use mystery sets: write "(coach reveals next rep)" for one element per practice
- Use time trial relays or odds vs evens lane competitions
- Use "get-out swims" — one final fast rep, hit the goal time and practice ends
- Vary distances constantly within a set — avoid repeating the same distance more than 4 times in a row
- Every main set should have at least one element that creates competition, stakes, or surprise
- Fun and punishing are not opposites. Make them earn it but make it interesting.`;

function calcYardage(levelId, intensity, minutes) {
  const ypm = YPM[levelId]?.[intensity - 1] ?? 20;
  return Math.round((ypm * minutes) / 50) * 50;
}

function buildSysPrompt(levelLabel, intensity, targetYards, practiceMin, splitMode) {
  return `You are an expert competitive swimming coach writing real, practical, ENGAGING workouts for club swimmers.

MATH RULES:
- After every set write the math: e.g. "8 × 100 = 800 yds"
- End every section (WARM-UP, PRE-SET, MAIN SET, COOL-DOWN) with: "--- Section total: XXX yds ---"
- End with: "=== TOTAL: XXX yds ===" which must equal exact sum of section totals
- Use these exact section headers so the app can parse them

${VARIETY_RULES}

PARAMETERS:
- Swimmer level: ${levelLabel}
- Intensity: ${intensity}/5 — ${INTENSITY_LABELS[intensity-1]}
- Practice duration: ${practiceMin} minutes
- Target yardage: ${targetYards} yards — calibrate to this, do not exceed by more than 5%

INTENSITY:
1 Just Moving — fun, generous rest, no pressure
2 Fitness — moderate, achievable, feel good when done
3 Training — focused, snug intervals, some challenge
4 Competitive — tight intervals, designed for real improvement
5 Elite — what top programs actually do, demanding

${splitMode ? `SPLIT OUTPUT — write two clearly labeled sections:

COMPETITIVE LANE
[full target yardage, tight intervals, competition elements, get-out swim]

REC LANE
[same theme, 60-70% yardage, longer rest, (optional) sets, still fun and engaging]

Full math for both.` : "Write ONE complete workout."}

Write how a coach writes on a whiteboard. Every set: reps, distance, interval or rest, stroke, equipment. Be specific.`;
}

function buildTweakPrompt(sectionName, currentText, tweakRequest, levelLabel, targetSectionYards) {
  return `You are an expert swim coach. Rewrite ONLY the ${sectionName} section of a practice.

CURRENT ${sectionName}:
${currentText}

COACH'S TWEAK REQUEST: "${tweakRequest}"

RULES:
- Keep approximately ${targetSectionYards} yards for this section
- Show math after every set: e.g. "8 × 100 = 800 yds"
- End with: "--- Section total: XXX yds ---"
- Apply the tweak request faithfully
- Keep it engaging — no boring straight 400s, use variety, ladders, competition elements
- Swimmer level: ${levelLabel}

Return ONLY the rewritten section. No intro, no explanation. Just the section content starting with the section header.`;
}

function parseSections(text) {
  const headers = ["WARM-UP", "PRE-SET", "MAIN SET", "COOL-DOWN"];
  const result = {};
  headers.forEach((h, i) => {
    const start = text.search(new RegExp(h, "i"));
    const nextH = headers[i + 1];
    const end   = nextH ? text.search(new RegExp(nextH, "i")) : text.search(/===\s*TOTAL/i);
    if (start !== -1) {
      result[h] = text.slice(start, end !== -1 ? end : undefined).trim();
    }
  });
  const totalMatch = text.match(/===\s*TOTAL:.*===/i);
  if (totalMatch) result["TOTAL"] = totalMatch[0];
  return result;
}

function parseSplit(text) {
  const compPatterns = [/COMPETITIVE LANE/i, /COMP LANE/i, /VERSION 1/i, /COMPETITIVE GROUP/i];
  const recPatterns  = [/REC LANE/i, /REC GROUP/i, /VERSION 2/i, /RECREATIONAL/i];

  let compIdx = -1, recIdx = -1;
  for (const p of compPatterns) { const i = text.search(p); if (i !== -1) { compIdx = i; break; } }
  for (const p of recPatterns)  { const i = text.search(p); if (i !== -1) { recIdx = i; break; } }

  if (compIdx !== -1 && recIdx !== -1 && compIdx < recIdx) {
    return { comp: text.slice(compIdx, recIdx).trim(), rec: text.slice(recIdx).trim() };
  }
  return null;
}

function escapeHtml(str) {
  return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function Chip({ label, selected, onClick, accent = "#38bdf8" }) {

    }}>{label}</button>

}

function CopyPrintBar({ content }) {
  const [copied, setCopied] = useState(false);
  const handleCopy = () => {
    navigator.clipboard.writeText(content)
      .then(() => { setCopied(true); setTimeout(() => setCopied(false), 2000); })
      .catch(() => {});
  };
  const handlePrint = () => {
    const win = window.open("", "_blank");
    if (!win) return;
    win.document.write(`<html><head><title>Swim Workout</title>
      <style>body{font-family:monospace;font-size:12px;line-height:1.7;padding:24px;color:#000;}pre{white-space:pre-wrap;}</style>
      </head><body><pre>${escapeHtml(content)}</pre></body></html>`);
    win.document.close(); win.print();
  };
  return (
    <div style={{ display: "flex", gap: "8px", marginTop: "14px", paddingTop: "12px", borderTop: "1px solid rgba(255,255,255,0.08)" }}>
      <button onClick={handleCopy} aria-label={copied ? "Copied" : "Copy workout"} style={{ flex: 1, padding: "11px", borderRadius: "8px", border: "1px solid rgba(255,255,255,0.15)", background: copied ? "rgba(34,197,94,0.2)" : "rgba(255,255,255,0.05)", color: copied ? "#22c55e" : "#94a3b8", cursor: "pointer", fontSize: "12px", fontWeight: "600", minHeight: "44px" }}>
        {copied ? "Copied!" : "Copy"}
      </button>
      <button onClick={handlePrint} aria-label="Print workout" style={{ flex: 1, padding: "11px", borderRadius: "8px", border: "1px solid rgba(255,255,255,0.15)", background: "rgba(255,255,255,0.05)", color: "#94a3b8", cursor: "pointer", fontSize: "12px", fontWeight: "600", minHeight: "44px" }}>
        Print
      </button>
    </div>
  );
}

function SectionCard({ name, content, onTweak, accent = "#38bdf8" }) {
  const [tweaking, setTweaking]   = useState(false);
  const [tweakInput, setTweakInput] = useState("");
  const [loading, setLoading]     = useState(false);

  const icons = { "WARM-UP": "🌊", "PRE-SET": "🦵", "MAIN SET": "🔥", "COOL-DOWN": "😌" };

  return (
    <div style={{ background: "rgba(255,255,255,0.03)", border: `1px solid ${accent}33`, borderRadius: "10px", padding: "14px", marginBottom: "10px" }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "10px" }}>
        <div style={{ fontSize: "11px", color: accent, fontWeight: "700", letterSpacing: "1px", textTransform: "uppercase" }}>
          {icons[name] || ""} {name}
        </div>
        <button onClick={() => setTweaking(!tweaking)} aria-label={tweaking ? "Cancel tweak" : `Tweak ${name}`} style={{ padding: "6px 14px", borderRadius: "12px", border: `1px solid ${accent}55`, background: tweaking ? `${accent}22` : "transparent", color: accent, cursor: "pointer", fontSize: "11px", fontWeight: "600", minHeight: "32px" }}>
          {tweaking ? "Cancel" : "Tweak"}
        </button>
      </div>

      <pre style={{ whiteSpace: "pre-wrap", fontFamily: "'Courier New', monospace", fontSize: "12px", lineHeight: "1.75", color: "#cbd5e1", margin: 0 }}>{content}</pre>

      {tweaking && (
        <div style={{ marginTop: "12px", paddingTop: "12px", borderTop: `1px solid ${accent}22` }}>
          <div style={{ fontSize: "10px", color: "#64748b", marginBottom: "6px" }}>Tell Kim what to change about this section:</div>
          <div style={{ display: "flex", gap: "8px" }}>
            <input
              value={tweakInput}
              onChange={e => setTweakInput(e.target.value)}
              onKeyDown={e => e.key === "Enter" && tweakInput.trim() && !loading && onTweak(name, content, tweakInput, setLoading, () => { setTweaking(false); setTweakInput(""); })}
              placeholder='e.g. "more backstroke" or "make it a race"'
              style={{ flex: 1, padding: "11px 13px", borderRadius: "20px", background: "rgba(255,255,255,0.07)", border: `1px solid ${accent}44`, color: "#e2e8f0", fontSize: "13px", outline: "none" }}
            />
            <button
              onClick={() => tweakInput.trim() && !loading && onTweak(name, content, tweakInput, setLoading, () => { setTweaking(false); setTweakInput(""); })}
              disabled={loading || !tweakInput.trim()}
              aria-label="Submit tweak"
              style={{ padding: "11px 18px", borderRadius: "20px", border: "none", background: tweakInput.trim() ? accent : "rgba(255,255,255,0.1)", color: tweakInput.trim() ? "#070d1a" : "#475569", cursor: tweakInput.trim() ? "pointer" : "not-allowed", fontSize: "14px", fontWeight: "700", minWidth: "44px", minHeight: "44px" }}>
              {loading ? "..." : "Go"}
            </button>
          </div>
        </div>
      )}
    </div>
  );
}

function WorkoutOutput({ text, levelLabel, iColor, splitMode, activeView, setActiveView, onSectionUpdate }) {
  const splitResult = splitMode ? parseSplit(text) : null;

  const renderSections = (rawText, accent, sectionCallback) => {
    const sections = parseSections(rawText);
    const order    = ["WARM-UP", "PRE-SET", "MAIN SET", "COOL-DOWN"];
    const hasAll   = order.every(k => sections[k]);

    if (!hasAll) {
      return (
        <div>
          <pre style={{ whiteSpace: "pre-wrap", fontFamily: "'Courier New', monospace", fontSize: "12px", lineHeight: "1.8", color: "#cbd5e1", margin: 0 }}>{rawText}</pre>
          <CopyPrintBar content={rawText} />
        </div>
      );
    }

    return (
      <div>
        {order.map(name => (
          <SectionCard key={name} name={name} content={sections[name]} accent={accent} onTweak={sectionCallback} />
        ))}
        {sections["TOTAL"] && (
          <div style={{ textAlign: "center", padding: "10px", fontSize: "13px", fontWeight: "700", color: accent }}>{sections["TOTAL"]}</div>
        )}
        <CopyPrintBar content={rawText} />
      </div>
    );
  };

  if (splitResult) {
    return (
      <div>
        <div style={{ display: "flex", gap: "8px", marginBottom: "12px" }}>
          <button onClick={() => setActiveView("comp")} style={{ flex: 1, padding: "11px", borderRadius: "10px", border: `2px solid ${activeView === "comp" ? "#f97316" : "rgba(255,255,255,0.1)"}`, background: activeView === "comp" ? "rgba(249,115,22,0.15)" : "transparent", color: activeView === "comp" ? "#f97316" : "#64748b", cursor: "pointer", fontSize: "13px", fontWeight: "700", minHeight: "44px" }}>
            Competitive Lane
          </button>
          <button onClick={() => setActiveView("rec")} style={{ flex: 1, padding: "11px", borderRadius: "10px", border: `2px solid ${activeView === "rec" ? "#38bdf8" : "rgba(255,255,255,0.1)"}`, background: activeView === "rec" ? "rgba(56,189,248,0.15)" : "transparent", color: activeView === "rec" ? "#38bdf8" : "#64748b", cursor: "pointer", fontSize: "13px", fontWeight: "700", minHeight: "44px" }}>
            Rec Lane
          </button>
        </div>
        {activeView === "comp" && (
          <div style={{ background: "rgba(249,115,22,0.04)", border: "2px solid rgba(249,115,22,0.3)", borderRadius: "12px", padding: "16px" }}>
            <div style={{ fontSize: "10px", color: "#f97316", fontWeight: "700", letterSpacing: "1px", textTransform: "uppercase", marginBottom: "12px" }}>Competitive Lane</div>
            {renderSections(splitResult.comp, "#f97316", onSectionUpdate)}
          </div>
        )}
        {activeView === "rec" && (
          <div style={{ background: "rgba(56,189,248,0.04)", border: "2px solid rgba(56,189,248,0.3)", borderRadius: "12px", padding: "16px" }}>
            <div style={{ fontSize: "10px", color: "#38bdf8", fontWeight: "700", letterSpacing: "1px", textTransform: "uppercase", marginBottom: "12px" }}>Rec Lane</div>
            {renderSections(splitResult.rec, "#38bdf8", onSectionUpdate)}
          </div>
        )}
      </div>
    );
  }

  return (
    <div style={{ background: "rgba(255,255,255,0.03)", border: `1px solid ${iColor}44`, borderRadius: "12px", padding: "16px" }}>
      <div style={{ fontSize: "10px", color: iColor, fontWeight: "700", letterSpacing: "1px", textTransform: "uppercase", marginBottom: "12px" }}>Workout</div>
      {renderSections(text, iColor, onSectionUpdate)}
    </div>
  );
}

function SwimCoach() {
  const [tab, setTab]               = useState("schedule");
  const [level, setLevel]           = useState("high_school");
  const [focus, setFocus]           = useState("aerobic");
  const [phase, setPhase]           = useState("peak");
  const [practiceLen, setPracticeLen] = useState(90);
  const [intensity, setIntensity]   = useState(3);
  const [splitMode, setSplitMode]   = useState(false);
  const [days, setDays]             = useState(["Mon", "Wed", "Fri"]);
  const [rawSchedule, setRawSchedule] = useState(null);
  const [workoutText, setWorkoutText] = useState(null);
  const [isBuilding, setIsBuilding] = useState(false);
  const [activeView, setActiveView] = useState("comp");
  const [error, setError]           = useState(null);

  const [messages, setMessages]         = useState([{ role: "assistant", content: "Hey Coach. Tell me what you need — a full workout, a quick set, a mid-practice adjustment, or just ask me anything about training. I'll write it with the math and keep it interesting." }]);
  const [chatInput, setChatInput]       = useState("");
  const [isChatLoading, setIsChatLoading] = useState(false);
  const chatEndRef = useRef(null);

  useEffect(() => { chatEndRef.current?.scrollIntoView({ behavior: "smooth" }); }, [messages, isChatLoading]);

  const levelInfo   = LEVELS.find(l => l.id === level);
  const focusInfo   = FOCUS_AREAS.find(f => f.id === focus);
  const phaseInfo   = SEASON_PHASES.find(p => p.id === phase);
  const targetYards = calcYardage(level, intensity, practiceLen);
  const iColor      = INTENSITY_COLORS[intensity - 1];

  const buildSchedule = async () => {
    setIsBuilding(true); setWorkoutText(null); setRawSchedule(null); setActiveView("comp"); setError(null);
    const sys    = buildSysPrompt(levelInfo.label, intensity, targetYards, practiceLen, splitMode);
    const dayList = days.join(", ");
    const prompt = `Write a complete swimming practice schedule for: ${dayList} (${days.length} practice${days.length > 1 ? "s" : ""}).
Level: ${levelInfo.label} | Focus: ${focusInfo.emoji} ${focusInfo.label} | Phase: ${phaseInfo.label}
Practice: ${practiceLen} min | Intensity: ${intensity}/5 | Target: ${targetYards} yds per session
${splitMode ? "SPLIT: Write COMPETITIVE LANE section first, then REC LANE section." : ""}
Label each practice by day. Every section uses exact headers: WARM-UP, PRE-SET, MAIN SET, COOL-DOWN.`;
    try {
      const res  = await safeFetch("/api/chat", {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ model: "claude-sonnet-4-6", max_tokens: 4096, system: sys, messages: [{ role: "user", content: prompt }] })
      });
      const data = await res.json();
      const text = data.content?.find(b => b.type === "text")?.text || "Could not generate — try again in a sec.";
      setRawSchedule(text); setWorkoutText(text);
    } catch (err) {
      const msg = err.name === "AbortError" ? "Request timed out — check your connection and try again." : (err.message || "Couldn't connect right now. Check your internet and try again.");
      setError(msg); setWorkoutText(null);
    }
    setIsBuilding(false);
  };

  const handleSectionUpdate = async (sectionName, currentContent, tweakRequest, setLoading, onDone) => {
    setLoading(true);
    const sectionYards = Math.round(targetYards * (sectionName === "MAIN SET" ? 0.55 : sectionName === "WARM-UP" ? 0.175 : sectionName === "PRE-SET" ? 0.175 : 0.10));
    const sys = buildTweakPrompt(sectionName, currentContent, tweakRequest, levelInfo.label, sectionYards);
    try {
      const res  = await safeFetch("/api/chat", {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ model: "claude-sonnet-4-6", max_tokens: 4096, system: sys, messages: [{ role: "user", content: `Rewrite the ${sectionName} with this tweak: "${tweakRequest}"` }] })
      });
      const data = await res.json();
      const newSection = data.content?.find(b => b.type === "text")?.text || currentContent;
      setWorkoutText(prev => prev.replace(currentContent, newSection));
      onDone();
    } catch (err) {
      /* keep tweak panel open on failure so user can retry */
    }
    setLoading(false);
  };

  const sendChat = async () => {
    if (!chatInput.trim() || isChatLoading) return;
    const userMsg = { role: "user", content: chatInput.trim() };
    const updated = [...messages, userMsg];
    setMessages(updated); setChatInput(""); setIsChatLoading(true);
    try {
      const res  = await safeFetch("/api/chat", {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-6", max_tokens: 4096,
          system: `You are an expert competitive swim coach who thinks on your feet. Kim is a real D1 swim coach using you poolside during practice. She may need instant adjustments: lost lanes, equipment changes, shortened time, injured swimmers, unexpected lane counts, or complete rewrites mid-practice. Respond fast, be specific (reps, distance, interval, stroke, equipment), and always show the math. If she describes a problem, give her the solution immediately — no preamble, no "great question," just the workout. ${VARIETY_RULES} Show math after every set. Section subtotals. Grand total exact.`,
          messages: updated.map(m => ({ role: m.role, content: m.content }))
        })
      });
      const data = await res.json();
      setMessages(prev => [...prev, { role: "assistant", content: data.content?.find(b => b.type === "text")?.text || "No response." }]);
    } catch (err) {
      const msg = err.name === "AbortError" ? "Request timed out — check your connection." : (err.message || "Couldn't connect — check your signal and try again.");
      setMessages(prev => [...prev, { role: "assistant", content: msg }]);
    }
    setIsChatLoading(false);
  };

  const toggleDay = (d) => setDays(prev =>
    prev.includes(d) ? prev.filter(x => x !== d) : [...prev, d].sort((a, b) => DAYS_OF_WEEK.indexOf(a) - DAYS_OF_WEEK.indexOf(b))
  );

  return (
    <div style={{ fontFamily: "'Inter', system-ui, sans-serif", background: "#070d1a", height: "100%", color: "#e2e8f0", display: "flex", flexDirection: "column" }}>

      <div style={{ flexShrink: 0, background: "linear-gradient(180deg,#0c1a33 0%,#070d1a 100%)", borderBottom: "1px solid rgba(56,189,248,0.15)", padding: "16px 20px 0", paddingTop: "max(16px, env(safe-area-inset-top))" }}>
        <div style={{ display: "flex", alignItems: "center", gap: "10px", marginBottom: "4px" }}>
          <span style={{ fontSize: "22px" }}>🏊</span>
          <div>
            <div style={{ fontSize: "17px", fontWeight: "800", color: "#38bdf8", letterSpacing: "-0.3px" }}>Kim's Little Helper</div>
            <div style={{ fontSize: "10px", color: "#475569", letterSpacing: "0.5px", textTransform: "uppercase" }}>Real workouts · Tap any section to tweak</div>
          </div>
        </div>
        <div style={{ display: "flex", gap: "4px", marginTop: "12px" }} role="tablist">
          {[{ id: "schedule", label: "Make a Workout" }, { id: "chat", label: "Ask Coach" }].map(t => (
            <button key={t.id} onClick={() => setTab(t.id)} role="tab" aria-selected={tab === t.id} style={{ padding: "10px 16px", borderRadius: "8px 8px 0 0", border: "none", cursor: "pointer", fontSize: "13px", fontWeight: "600", background: tab === t.id ? "#0f172a" : "transparent", color: tab === t.id? "#38bdf8" : "#64748b", borderBottom: tab === t.id ? "2px solid #38bdf8" : "2px solid transparent", minHeight: "40px" }}>{t.label}</button>
          ))}
        </div>
      </div>

      {tab === "schedule" && (
        <div className="scroll-container" style={{ flex: 1, overflowY: "auto", WebkitOverflowScrolling: "touch", padding: "16px", paddingBottom: "max(16px, env(safe-area-inset-bottom))" }}>
          <div style={{ background: "rgba(255,255,255,0.03)", border: "1px solid rgba(255,255,255,0.08)", borderRadius: "14px", padding: "18px", marginBottom: "16px" }}>

            <div style={{ marginBottom: "18px" }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "8px" }}>
                <div style={{ fontSize: "10px", color: "#64748b", fontWeight: "700", letterSpacing: "1.5px", textTransform: "uppercase" }}>Select Days</div>
                <div style={{ fontSize: "11px", color: "#38bdf8" }}>{days.length} day{days.length !== 1 ? "s" : ""}</div>
              </div>
              <div style={{ display: "flex", gap: "6px" }}>
                {DAYS_OF_WEEK.map(d => {
                  const sel = days.includes(d);
                  return <button key={d} onClick={() => toggleDay(d)} aria-pressed={sel} style={{ flex: 1, padding: "10px 0", borderRadius: "8px", border: `1px solid ${sel ? "#38bdf8" : "rgba(255,255,255,0.1)"}`, background: sel ? "rgba(56,189,248,0.18)" : "transparent", color: sel ? "#38bdf8" : "#64748b", cursor: "pointer", fontSize: "12px", fontWeight: sel ? "700" : "400", minHeight: "40px" }}>{d}</button>;
                })}
              </div>
            </div>

            <div style={{ marginBottom: "16px" }}>
              <div style={{ fontSize: "10px", color: "#64748b", fontWeight: "700", letterSpacing: "1.5px", textTransform: "uppercase", marginBottom: "8px" }}>Swimmer Level</div>
              <div style={{ display: "flex", flexWrap: "wrap", gap: "6px" }}>
                {LEVELS.map(l => <Chip key={l.id} label={l.label} selected={level === l.id} onClick={() => setLevel(l.id)} accent="#38bdf8" />)}
              </div>
            </div>

            <div style={{ marginBottom: "18px" }}>
              <div style={{ fontSize: "10px", color: "#64748b", fontWeight: "700", letterSpacing: "1.5px", textTransform: "uppercase", marginBottom: "8px" }}>Focus</div>
              <div style={{ display: "flex", flexWrap: "wrap", gap: "6px" }}>
                {FOCUS_AREAS.map(f => <Chip key={f.id} label={`${f.emoji} ${f.label}`} selected={focus === f.id} onClick={() => setFocus(f.id)} accent="#34d399" />)}
              </div>
            </div>

            <div style={{ marginBottom: "18px" }}>
              <div style={{ fontSize: "10px", color: "#64748b", fontWeight: "700", letterSpacing: "1.5px", textTransform: "uppercase", marginBottom: "8px" }}>Workout Mode</div>
              <div style={{ display: "flex", gap: "8px" }}>
                <button onClick={() => setSplitMode(false)} aria-pressed={!splitMode} style={{ flex: 1, padding: "12px", borderRadius: "10px", border: `2px solid ${!splitMode ? "#38bdf8" : "rgba(255,255,255,0.1)"}`, background: !splitMode ? "rgba(56,189,248,0.15)" : "transparent", color: !splitMode ? "#38bdf8" : "#64748b", cursor: "pointer", fontSize: "13px", fontWeight: "700", minHeight: "44px" }}>
                  One Workout
                </button>
                <button onClick={() => setSplitMode(true)} aria-pressed={splitMode} style={{ flex: 1, padding: "12px", borderRadius: "10px", border: `2px solid ${splitMode ? "#a78bfa" : "rgba(255,255,255,0.1)"}`, background: splitMode ? "rgba(167,139,250,0.18)" : "transparent", color: splitMode ? "#a78bfa" : "#64748b", cursor: "pointer", fontSize: "13px", fontWeight: "700", minHeight: "44px" }}>
                  Comp + Rec
                </button>
              </div>
              {splitMode && <div style={{ marginTop: "6px", fontSize: "11px", color: "#a78bfa" }}>Generates two versions — flip between them in the output</div>}
            </div>

            <div style={{ borderTop: "1px solid rgba(255,255,255,0.06)", paddingTop: "14px", marginBottom: "14px", display: "flex", gap: "14px", flexWrap: "wrap" }}>
              <div>
                <div style={{ fontSize: "10px", color: "#475569", fontWeight: "700", letterSpacing: "1px", textTransform: "uppercase", marginBottom: "7px" }}>Length</div>
                <div style={{ display: "flex", gap: "5px" }}>
                  {LENGTH_OPTIONS.map(l => <button key={l} onClick={() => setPracticeLen(l)} aria-pressed={practiceLen === l} style={{ padding: "7px 10px", borderRadius: "7px", border: `1px solid ${practiceLen === l ? "#38bdf8" : "rgba(255,255,255,0.08)"}`, background: practiceLen === l ? "rgba(56,189,248,0.15)" : "transparent", color: practiceLen === l ? "#38bdf8" : "#475569", cursor: "pointer", fontSize: "11px", fontWeight: practiceLen === l ? "700" : "400", minHeight: "34px" }}>{l}m</button>)}
                </div>
              </div>
              <div>
                <div style={{ fontSize: "10px", color: "#475569", fontWeight: "700", letterSpacing: "1px", textTransform: "uppercase", marginBottom: "7px" }}>Phase</div>
                <div style={{ display: "flex", gap: "5px", flexWrap: "wrap" }}>
                  {SEASON_PHASES.map(p => <button key={p.id} onClick={() => setPhase(p.id)} aria-pressed={phase === p.id} style={{ padding: "7px 10px", borderRadius: "7px", border: `1px solid ${phase === p.id ? "#f59e0b" : "rgba(255,255,255,0.08)"}`, background: phase === p.id ? "rgba(245,158,11,0.15)" : "transparent", color: phase === p.id ? "#f59e0b" : "#475569", cursor: "pointer", fontSize: "11px", fontWeight: phase === p.id ? "700" : "400", minHeight: "34px" }}>{p.label}</button>)}
                </div>
              </div>
            </div>

            <div style={{ marginBottom: "18px" }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "6px" }}>
                <div style={{ fontSize: "10px", color: "#475569", fontWeight: "700", letterSpacing: "1px", textTransform: "uppercase" }}>Intensity</div>
                <div style={{ fontSize: "12px", fontWeight: "700", color: iColor }}>{intensity}/5 — {INTENSITY_LABELS[intensity - 1]}</div>
              </div>
              <input type="range" min="1" max="5" value={intensity} onChange={e => setIntensity(Number(e.target.value))} aria-label={`Intensity: ${INTENSITY_LABELS[intensity - 1]}`} style={{ width: "100%", accentColor: iColor, cursor: "pointer" }} />
              <div style={{ display: "flex", justifyContent: "space-between", marginTop: "3px" }}>
                {INTENSITY_LABELS.map((l, i) => <div key={l} style={{ fontSize: "9px", color: intensity === i + 1 ? INTENSITY_COLORS[i] : "#334155", textAlign: "center", width: "20%" }}>{l}</div>)}
              </div>
            </div>

            <button onClick={buildSchedule} disabled={isBuilding || days.length === 0} style={{ width: "100%", padding: "14px", borderRadius: "10px", border: "none", background: isBuilding || days.length === 0 ? "rgba(56,189,248,0.1)" : `linear-gradient(135deg,${iColor}88,${iColor})`, color: isBuilding ? "#38bdf8" : "#070d1a", fontSize: "14px", fontWeight: "700", cursor: isBuilding || days.length === 0 ? "not-allowed" : "pointer", minHeight: "48px" }}>
              {isBuilding ? "Writing..." : days.length === 0 ? "Select at least one day" : `Generate${splitMode ? " Comp + Rec" : ""} · ${days.length} Day${days.length !== 1 ? "s" : ""} · ${INTENSITY_LABELS[intensity - 1]}`}
            </button>
          </div>

          {error && (
            <div style={{ background: "rgba(239,68,68,0.1)", border: "1px solid rgba(239,68,68,0.3)", borderRadius: "10px", padding: "14px", marginBottom: "16px", color: "#fca5a5", fontSize: "13px" }}>
              {error}
            </div>
          )}

          {workoutText && (
            <WorkoutOutput
              text={workoutText}
              levelLabel={levelInfo.label}
              iColor={iColor}
              splitMode={splitMode}
              activeView={activeView}
              setActiveView={setActiveView}
              onSectionUpdate={handleSectionUpdate}
            />
          )}

          <div style={{ height: "40px" }} />
        </div>
      )}

      {tab === "chat" && (
        <div style={{ flex: 1, display: "flex", flexDirection: "column", overflow: "hidden" }}>
          <div className="scroll-container" style={{ flex: 1, overflowY: "auto", WebkitOverflowScrolling: "touch", padding: "16px" }}>
            {messages.map((msg, i) => (
              <div key={i} style={{ marginBottom: "14px", display: "flex", justifyContent: msg.role === "user" ? "flex-end" : "flex-start" }}>
                {msg.role === "assistant" && <div style={{ fontSize: "18px", marginRight: "8px", marginTop: "2px", flexShrink: 0 }}>🏊</div>}
                <div style={{ maxWidth: "86%", padding: "12px 16px", borderRadius: msg.role === "user" ? "18px 18px 4px 18px" : "18px 18px 18px 4px", background: msg.role === "user" ? "rgba(56,189,248,0.18)" : "rgba(255,255,255,0.05)", border: msg.role === "user" ? "1px solid rgba(56,189,248,0.35)" : "1px solid rgba(255,255,255,0.08)", fontSize: "13px", lineHeight: "1.65", color: "#e2e8f0", whiteSpace: "pre-wrap" }}>{msg.content}</div>
              </div>
            ))}
            {isChatLoading && (
              <div style={{ display: "flex", alignItems: "center", gap: "10px" }}>
                <span style={{ fontSize: "18px" }}>🏊</span>
                <div style={{ padding: "10px 16px", borderRadius: "18px 18px 18px 4px", background: "rgba(255,255,255,0.05)", border: "1px solid rgba(255,255,255,0.08)", fontSize: "13px", color: "#64748b" }}>writing it up...</div>
              </div>
            )}
            <div ref={chatEndRef} />
          </div>
          <div style={{ flexShrink: 0, padding: "0 16px 8px", display: "flex", gap: "6px", flexWrap: "wrap" }}>
            {["Lost a lane, rewrite main set", "Only kickboards today", "20 min left, need a finisher", "Rain delay, dryland for 15 min", "Easy recovery day", "Race pace 100s for high school"].map(q => (
              <button key={q} onClick={() => setChatInput(q)} style={{ padding: "7px 12px", borderRadius: "14px", border: "1px solid rgba(56,189,248,0.25)", background: "rgba(56,189,248,0.08)", color: "#7dd3fc", cursor: "pointer", fontSize: "11px", minHeight: "32px" }}>{q}</button>
            ))}
          </div>
          <div style={{ flexShrink: 0, padding: "10px 16px", paddingBottom: "max(14px, env(safe-area-inset-bottom))", borderTop: "1px solid rgba(255,255,255,0.08)", background: "rgba(0,0,0,0.3)" }}>
            <div style={{ display: "flex", gap: "10px" }}>
              <input value={chatInput} onChange={e => setChatInput(e.target.value)} onKeyDown={e => e.key === "Enter" && !e.shiftKey && sendChat()} placeholder="Ask for any set, workout, or coaching advice..." style={{ flex: 1, padding: "12px 16px", borderRadius: "24px", background: "rgba(255,255,255,0.07)", border: "1px solid rgba(56,189,248,0.25)", color: "#e2e8f0", fontSize: "13px", outline: "none" }} />
              <button onClick={sendChat} disabled={isChatLoading || !chatInput.trim()} aria-label="Send message" style={{ padding: "12px 18px", borderRadius: "24px", border: "none", background: chatInput.trim() ? "#38bdf8" : "rgba(56,189,248,0.2)", color: chatInput.trim() ? "#070d1a" : "#38bdf8", fontWeight: "700", cursor: chatInput.trim() ? "pointer" : "not-allowed", fontSize: "16px", minWidth: "48px", minHeight: "48px" }}>Go</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<SwimCoach />);
  </script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(err => console.error('SW registration failed:', err));
    }
  </script>
</body>
</html>
